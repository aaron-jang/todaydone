    <noscript>
      <div style="max-width:600px;margin:0 auto;padding:2rem;font-family:sans-serif;line-height:1.8;color:#1a1a1a;">
        <h1>우리 가족 루틴 - 매일 습관 체크 & 루틴 관리 도구</h1>
        <p>가족 모두의 하루 루틴을 간편하게 관리하세요. 매일 해야 할 일을 체크리스트로 정리하고, 시간·횟수 기반 루틴을 기록하며, 연속 달성 기록(스트릭)으로 자연스럽게 동기를 부여합니다. 회원가입 없이 모바일 브라우저에서 바로 사용할 수 있는 무료 PWA 생산성 도구입니다.</p>
        <h2>이런 고민을 해결합니다</h2>
        <ul>
          <li>아이의 생활 습관을 꾸준히 만들어주고 싶지만 매일 체크하기 번거로울 때</li>
          <li>가족 각자의 루틴을 한 곳에서 한눈에 관리하고 싶을 때</li>
          <li>얼마나 연속으로 루틴을 달성했는지 기록으로 남기고 싶을 때</li>
        </ul>
        <h2>사용 방법</h2>
        <ol>
          <li><strong>가족 등록:</strong> 설정에서 이름과 이모지를 선택해 가족 구성원을 추가합니다.</li>
          <li><strong>루틴 만들기:</strong> 체크(완료 여부) / 시간(목표 분) / 횟수(목표 회) 중 선택해 루틴을 등록합니다.</li>
          <li><strong>매일 체크:</strong> 오늘 페이지에서 완료한 루틴을 체크하고, 시간·횟수를 기록합니다.</li>
          <li><strong>기록 확인:</strong> 기록 페이지에서 연속 달성일과 루틴별 통계를 확인합니다.</li>
          <li><strong>공유하기:</strong> 오늘의 진행 현황을 가족·친구에게 공유합니다.</li>
        </ol>
        <h2>자주 묻는 질문</h2>
        <dl>
          <dt>회원가입이 필요한가요?</dt>
          <dd>아닙니다. 별도의 가입이나 로그인 없이 바로 사용 가능합니다. 모든 데이터는 기기에 저장됩니다.</dd>
          <dt>여러 가족이 함께 사용할 수 있나요?</dt>
          <dd>네! 설정에서 여러 가족 구성원을 등록하면 각각의 루틴을 따로 관리할 수 있습니다.</dd>
          <dt>오프라인에서도 사용 가능한가요?</dt>
          <dd>PWA로 설치하면 인터넷 없이도 사용할 수 있습니다.</dd>
          <dt>데이터 백업은 어떻게 하나요?</dt>
          <dd>설정 > 데이터 관리에서 백업 파일을 내보내고, 필요할 때 복원할 수 있습니다.</dd>
          <dt>알림 기능이 있나요?</dt>
          <dd>매일 원하는 시간에 루틴 알림을 받을 수 있습니다.</dd>
        </dl>
        <h2>주의사항</h2>
        <ul>
          <li>데이터는 브라우저에 저장되므로 캐시 삭제 시 데이터가 사라질 수 있습니다. 정기적으로 백업하세요.</li>
          <li>여러 기기 간 자동 동기화는 지원하지 않습니다 (수동 백업/복원 가능).</li>
          <li>이 앱을 사용하려면 JavaScript를 활성화해 주세요.</li>
        </ul>
      </div>
